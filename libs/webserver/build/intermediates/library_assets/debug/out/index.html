<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI-Deploy Web Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Auth Screen -->
        <div id="login">
            <h1>CI-Deploy</h1>
            <p class="subtitle">Enter the PIN shown on the device screen</p>
            
            <div class="form-group">
                <label for="pin">Security PIN</label>
                <input type="text" id="pin" class="pin-input" placeholder="••••" maxlength="4" autocomplete="off" inputmode="numeric">
                <div id="error" class="error-msg">Invalid PIN. Please try again.</div>
            </div>

            <button id="btnSubmit">Submit Auth</button>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard">
            <div class="welcome-avatar">✓</div>
            <h1>Dashboard</h1>
            <p class="welcome-text" id="welcomeMessage">Welcome to CI-Deploy Console</p>
            
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Console Authenticated</span>
            </div>

            <a class="btn-logout" id="btnLogcat" href="/logcat">View Logcat</a>

            <button class="btn-logout" id="btnLogout">Disconnect Console</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
