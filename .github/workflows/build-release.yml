name: Build and Release CI-Deploy APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p app/build/outputs/apk/release-pkg
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release-pkg/CI-Deploy_debug.apk

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate tag and release name based on date and commit SHA
          TAG_NAME="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          RELEASE_NAME="CI-Deploy Debug Release ($(date +'%Y-%m-%d'))"
          
          # If triggered by tag push, use the pushed tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            RELEASE_NAME="CI-Deploy Debug Release $TAG_NAME"
          fi
          
          echo "Creating release $RELEASE_NAME with tag $TAG_NAME"
          
          gh release create "$TAG_NAME" \
            app/build/outputs/apk/release-pkg/CI-Deploy_debug.apk \
            --title "$RELEASE_NAME" \
            --notes "Automated native Android debug build for CI-Deploy. Built from commit $GITHUB_SHA." \
            --clobber
