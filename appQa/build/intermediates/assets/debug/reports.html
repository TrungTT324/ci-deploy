<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Automation Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00E676;
            --primary-dark: #00C853;
            --accent: #00B0FF;
            --bg: #121212;
            --surface: #1E1E1E;
            --card: #2A2A2A;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .brand h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .filters {
            display: flex;
            gap: 12px;
        }

        .filter-btn {
            background-color: var(--card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4dp);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 230, 118, 0.15);
        }

        .preview-area {
            height: 180px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .preview-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .preview-area img {
            transform: scale(1.05);
        }

        .preview-area video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            width: 48px;
            height: 48px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            z-index: 2;
            transition: transform 0.2s ease;
        }

        .preview-area:hover .play-icon {
            transform: scale(1.1);
        }

        .play-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 4px;
        }

        .info-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .file-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .file-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: auto;
        }

        .btn-download {
            margin-top: 12px;
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: var(--accent);
            color: var(--bg);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background-color: var(--surface);
            border-radius: 16px;
            border: 1px dashed var(--border);
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-video {
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            outline: none;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>QA Automation Reports</h1>
                <p>Browse media captures and logs generated during test runs.</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterReports('all')">All</button>
                <button class="filter-btn" onclick="filterReports('image')">Screenshots</button>
                <button class="filter-btn" onclick="filterReports('video')">Videos</button>
            </div>
        </header>

        <div class="grid" id="reports-grid">
            <!-- Reports loaded dynamically -->
        </div>
    </div>

    <!-- Media preview modal -->
    <div id="media-modal" class="modal" onclick="closeModal()">
        <div class="modal-content-wrapper" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let reportsData = [];

        async function fetchReports() {
            try {
                const response = await fetch('/api/qa/files');
                reportsData = await response.json();
                renderGrid(reportsData);
            } catch (e) {
                console.error("Error loading files", e);
                document.getElementById('reports-grid').innerHTML = `
                    <div class="empty-state">
                        <h3>Error Connecting to Device API</h3>
                        <p>Verify the server is running and refresh the page.</p>
                    </div>
                `;
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        function renderGrid(files) {
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '';

            if (files.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No QA Reports Found</h3>
                        <p>Run screenshots or recordings from the overlay toolbar to view them here.</p>
                    </div>
                `;
                return;
            }

            files.forEach(file => {
                const fileUrl = `/qa/reports/${file.name}`;
                let previewHtml = '';

                if (file.type === 'image') {
                    previewHtml = `<img src="${fileUrl}" alt="${file.name}" onclick="openImage('${fileUrl}')">`;
                } else if (file.type === 'video') {
                    previewHtml = `
                        <div class="play-icon" onclick="openVideo('${fileUrl}')"></div>
                        <video src="${fileUrl}#t=0.5" preload="metadata" muted></video>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="preview-area">${previewHtml}</div>
                    <div class="info-area">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-meta">
                            <span>${formatBytes(file.size)}</span>
                            <span>${formatTime(file.lastModified)}</span>
                        </div>
                        <a href="${fileUrl}" download="${file.name}" class="btn-download">Download</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterReports(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (type === 'all') {
                renderGrid(reportsData);
            } else {
                const filtered = reportsData.filter(f => f.type === type);
                renderGrid(filtered);
            }
        }

        function openImage(url) {
            const modal = document.getElementById('media-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `<img src="${url}" class="modal-content">`;
            modal.style.display = 'flex';
        }

        function openVideo(url) {
            const modal = document.getElementById('media-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `<video src="${url}" class="modal-video" controls autoplay></video>`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('media-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = '';
            modal.style.display = 'none';
        }

        // Initialize
        fetchReports();
    </script>
</body>
</html>
